<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Retro DASH</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
  }
  #gameCanvas {
    display: block;
    border: 3px solid #fff;
    box-shadow: 0 0 40px rgba(255,255,255,0.15), 0 0 80px rgba(255,255,255,0.05);
    /* JS sets style.width / style.height to fill viewport */
  }
  /* Portrait hint — only shown when screen is taller than wide */
  #rotate-hint {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    text-align: center;
    gap: 24px;
    z-index: 99;
  }
  #rotate-hint svg { width: 64px; height: 64px; fill: #fff; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @media (orientation: portrait) and (max-width: 600px) {
    #rotate-hint { display: flex; }
  }
</style>
</head>
<body>
<div id="rotate-hint">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.55C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25-.77c-.59-.59-1.54-.59-2.12 0L1.75 8.11c-.59.59-.59 1.54 0 2.12l12.02 12.02c.59.59 1.54.59 2.12 0l6.36-6.36c.59-.59.59-1.54 0-2.12L10.23 1.75zm4.6 19.44L2.81 9.17l6.36-6.36 12.02 12.02-6.36 6.36zm-7.36.29C4.2 19.93 1.86 16.76 1.5 13H0C.56 19.16 5.71 24 12 24l.66-.03-3.81-3.81-1.38 1.32z"/>
  </svg>
  <span>Rotate your device<br>for the best experience!</span>
</div>
<canvas id="gameCanvas"></canvas>
<script>
// ─── SETUP ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 500;
canvas.width  = W;
canvas.height = H;

// Responsive scaling — keeps logical resolution, scales CSS size to viewport
function resizeCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const aspect = W / H;
  let cw, ch;
  if (vw / vh > aspect) { ch = vh; cw = ch * aspect; }
  else                   { cw = vw; ch = cw / aspect; }
  canvas.style.width  = Math.floor(cw) + 'px';
  canvas.style.height = Math.floor(ch) + 'px';
  // Remove border on very small screens to gain space
  canvas.style.border = cw < 480 ? 'none' : '3px solid #fff';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  switch (type) {
    case 'jump':
      o.type = 'square';
      o.frequency.setValueAtTime(320, t);
      o.frequency.exponentialRampToValueAtTime(640, t + 0.12);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      o.start(t); o.stop(t + 0.14); break;
    case 'jump2':
      o.type = 'square';
      o.frequency.setValueAtTime(480, t);
      o.frequency.exponentialRampToValueAtTime(960, t + 0.1);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.12); break;
    case 'death':
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(440, t);
      o.frequency.exponentialRampToValueAtTime(55, t + 0.55);
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      o.start(t); o.stop(t + 0.55); break;
    case 'milestone':
      o.type = 'square';
      [523,659,784,1047].forEach((f, i) => {
        o.frequency.setValueAtTime(f, t + i * 0.08);
      });
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4); break;
  }
}

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const GROUND_Y     = H - 110;
const GRAVITY      = 0.72;
const JUMP_FORCE   = -15.5;
const INIT_SPEED   = 4;
const MAX_SPEED    = 9.5;

// ─── STATE ───────────────────────────────────────────────────────────────────
let state     = 'menu';
let score     = 0;
let highScore = 0;
let speed     = INIT_SPEED;
let frame     = 0;
let deathTimer= 0;
let shakeStr  = 0;
let shakeX = 0, shakeY = 0;
let lastMilestone = 0;

// ─── THEMES ──────────────────────────────────────────────────────────────────
const THEMES = {
  original: {
    name: 'Original', swatches: ['#fff','#555','#000'], bgType: 'city',
    sky: ['#0e0e0e','#2c2c2c','#484848'], starColor: 'rgba(255,255,255,',
    cloudFill: '#d8d8d8',
    ground: { top:'#505050', mid:'#404040', bot:'#1e1e1e',
              line:'#ffffff', tile1:'#3c3c3c', tile2:'#474747',
              stripe1:'#2e2e2e', stripe2:'#252525' },
    block:  { g1:'#888', g2:'#5c5c5c', g3:'#333' },
    player: { body:'#ffffff', outline:'#000000', ear:'#111111',
              face:'#f2f2f2', dot:'rgba(0,0,0,0.04)' }
  },
  fullColor: {
    name: 'Full Color', swatches: ['#ffeb3b','#f44336','#2196f3'], bgType: 'colorCity',
    sky: ['#1565c0','#42a5f5','#81d4fa'], starColor: 'rgba(255,255,255,',
    cloudFill: '#ffffff',
    ground: { top:'#43a047', mid:'#2e7d32', bot:'#1b5e20',
              line:'#ffee58', tile1:'#388e3c', tile2:'#4caf50',
              stripe1:'#2e7d32', stripe2:'#1b5e20' },
    block:  { g1:'#42a5f5', g2:'#1565c0', g3:'#0d47a1' },
    player: { body:'#ffeb3b', outline:'#e65100', ear:'#ef5350',
              face:'#fff176', dot:'rgba(230,81,0,0.07)' }
  },
  pastel: {
    name: 'Pastel Color', swatches: ['#f8bbd0','#ce93d8','#a5d6a7'], bgType: 'rainbow',
    sky: ['#fce4ec','#f8bbd0','#e8d5f5'], starColor: 'rgba(255,160,200,',
    cloudFill: '#ffffff',
    ground: { top:'#a5d6a7', mid:'#81c784', bot:'#4caf50',
              line:'#f48fb1', tile1:'#c8e6c9', tile2:'#a5d6a7',
              stripe1:'#81c784', stripe2:'#66bb6a' },
    block:  { g1:'#ce93d8', g2:'#ab47bc', g3:'#7b1fa2' },
    player: { body:'#fff9c4', outline:'#f06292', ear:'#f48fb1',
              face:'#fffde7', dot:'rgba(240,98,146,0.06)' }
  },
  purplish: {
    name: 'Purplish', swatches: ['#e040fb','#7c4dff','#18ffff'], bgType: 'skylight',
    sky: ['#0d0019','#1a0533','#3d1178'], starColor: 'rgba(200,160,255,',
    cloudFill: '#7b1fa2',
    ground: { top:'#4a148c', mid:'#38006b', bot:'#1a0045',
              line:'#ea80fc', tile1:'#6a1b9a', tile2:'#7b1fa2',
              stripe1:'#4a148c', stripe2:'#38006b' },
    block:  { g1:'#ab47bc', g2:'#7b1fa2', g3:'#4a148c' },
    player: { body:'#e1bee7', outline:'#4a148c', ear:'#7b1fa2',
              face:'#f3e5f5', dot:'rgba(74,20,140,0.06)' }
  }
};

let currentTheme = 'original';
let showThemePicker = false;
// Theme button region in canvas coords (top-right corner)
const TB = { x: W - 54, y: 7, w: 46, h: 33 };
function T() { return THEMES[currentTheme]; }

// ─── UTILS ───────────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function star5(cx, cy, r1, r2) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? r2 : r1;
    const a = (i * Math.PI / 5) - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
            : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  ctx.closePath();
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const player = {
  x: 130, y: 0, w: 58, h: 58,
  vy: 0, jumps: 0, maxJumps: 2,
  onGround: true, alive: true,
  prevY: 0,
  sx: 1, sy: 1,          // squish/stretch scale
  rot: 0,
  blinkT: 0, blinkLen: 100, blinking: false,

  get hb() {
    return { x: this.x + 9, y: this.y + 7, w: this.w - 18, h: this.h - 9 };
  },

  reset() {
    this.y = GROUND_Y - this.h;
    this.vy = 0; this.jumps = 0;
    this.onGround = true; this.alive = true;
    this.sx = 1; this.sy = 1; this.rot = 0;
    this.blinkT = 0; this.blinking = false;
  },

  jump() {
    if (!this.alive || this.jumps >= this.maxJumps) return;
    beep(this.jumps === 0 ? 'jump' : 'jump2');
    this.vy = JUMP_FORCE;
    this.jumps++;
    this.onGround = false;
    this.sx = 1.35; this.sy = 0.65;
    spawnJumpDust(this.x + this.w / 2, this.y + this.h);
  },

  update() {
    // Track previous Y for block-landing detection
    this.prevY = this.y;

    // Blink
    this.blinkT++;
    if (this.blinkT > this.blinkLen)   this.blinking = true;
    if (this.blinkT > this.blinkLen + 5) {
      this.blinking = false; this.blinkT = 0;
      this.blinkLen = 80 + Math.random() * 100;
    }

    // Reset onGround — collision checks below will set it if needed
    this.onGround = false;

    // Physics
    this.vy += GRAVITY;
    this.y  += this.vy;
    if (this.vy !== 0) this.rot += (this.jumps >= 2 ? 0.04 : 0.01);

    // Ground (GROUND_Y)
    if (this.y >= GROUND_Y - this.h) {
      this.y = GROUND_Y - this.h;
      if (this.vy > 6) { this.sx = 1.45; this.sy = 0.55; }
      this.vy = 0; this.jumps = 0; this.onGround = true;
      this.rot *= 0.6;
    }

    // Recover scale & rotation
    this.sx  += (1 - this.sx)  * 0.22;
    this.sy  += (1 - this.sy)  * 0.22;
    this.rot *= 0.88;
  },

  draw() {
    const hw = this.w / 2, hh = this.h / 2;
    const pc = T().player;
    ctx.save();
    ctx.translate(this.x + hw, this.y + hh);
    ctx.rotate(this.rot);
    ctx.scale(this.sx, this.sy);

    // Ears (behind body)
    ctx.fillStyle = pc.ear;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    [-0.48, 0.48].forEach(dx => {
      ctx.beginPath();
      ctx.arc(hw * dx, -hh - 7, 11, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    });

    // Body fill
    ctx.fillStyle = pc.body;
    ctx.strokeStyle = pc.outline;
    ctx.lineWidth = 4;
    roundRect(-hw, -hh, this.w, this.h, 14);
    ctx.fill(); ctx.stroke();

    // Face tint
    ctx.fillStyle = pc.face;
    roundRect(-hw + 6, -hh + 6, this.w - 12, this.h - 12, 9);
    ctx.fill();

    // Subtle halftone dots
    ctx.fillStyle = pc.dot;
    for (let dx = -hw + 9; dx < hw - 5; dx += 7)
      for (let dy = -hh + 9; dy < hh - 5; dy += 7) {
        ctx.beginPath();
        ctx.arc(dx, dy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

    // Eyes
    this._eye(-hw * 0.33, -hh * 0.18, 9);
    this._eye( hw * 0.33, -hh * 0.18, 9);

    // Mouth
    ctx.strokeStyle = pc.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (this.onGround) {
      ctx.arc(0, hh * 0.15, hw * 0.42, 0.18, Math.PI - 0.18);
    } else {
      ctx.arc(0, hh * 0.05, hw * 0.32, 0.45, Math.PI - 0.45);
    }
    ctx.stroke();

    ctx.restore();
  },

  _eye(ex, ey, r) {
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    if (this.blinking) {
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(ex - r, ey);
      ctx.lineTo(ex + r, ey);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(ex, ey + 2, r * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex + 3, ey - 1, r * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
  }
};

// ─── OBSTACLES ───────────────────────────────────────────────────────────────
let obstacles = [];
let spawnT    = 0;
let nextSpawn = 85;

function getNextSpawn() {
  return Math.max(42, 85 - Math.floor(score / 900) * 5) + (Math.random() * 28 - 14);
}

function spawnObstacle() {
  nextSpawn = getNextSpawn();
  const r = Math.random();
  const ox = W + 60;

  if (r < 0.30) {
    // Single spike
    obstacles.push(mk('spike', ox, GROUND_Y - 56, 44, 56));
  } else if (r < 0.50) {
    // Double spike
    obstacles.push(mk('spike', ox,      GROUND_Y - 56, 44, 56));
    obstacles.push(mk('spike', ox + 54, GROUND_Y - 56, 44, 56));
  } else if (r < 0.65) {
    // Short block
    obstacles.push(mk('block', ox, GROUND_Y - 66, 52, 66));
  } else if (r < 0.77) {
    // Tall block
    obstacles.push(mk('block', ox, GROUND_Y - 98, 52, 98));
  } else if (r < 0.88) {
    // Spike + block
    obstacles.push(mk('spike', ox,       GROUND_Y - 56, 44, 56));
    obstacles.push(mk('block', ox + 70,  GROUND_Y - 66, 52, 66));
  } else {
    // Triple spike (rare)
    obstacles.push(mk('spike', ox,       GROUND_Y - 56, 44, 56));
    obstacles.push(mk('spike', ox + 52,  GROUND_Y - 56, 44, 56));
    obstacles.push(mk('spike', ox + 104, GROUND_Y - 56, 44, 56));
  }
}

function mk(type, x, y, w, h) { return { type, x, y, w, h }; }

// ─── BACKGROUND WORLD ────────────────────────────────────────────────────────
let clouds = [], stars = [], buildings = [];
let groundOff = 0;

function initWorld() {
  clouds = [];
  for (let i = 0; i < 7; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 25 + Math.random() * 200,
      s: 0.4 + Math.random() * 0.7,
      spd: 0.25 + Math.random() * 0.4
    });
  }
  stars = [];
  for (let i = 0; i < 50; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * 210,
      r: 0.8 + Math.random() * 2.5,
      ph: Math.random() * Math.PI * 2
    });
  }
  buildings = [];
  let bx = 0;
  while (bx < W + 300) {
    const bh = 50 + Math.random() * 150;
    const bw = 45 + Math.random() * 55;
    buildings.push({ x: bx, y: GROUND_Y - bh, w: bw, h: bh });
    bx += bw + 5 + Math.random() * 20;
  }
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
let particles = [];

function spawnDeathBurst(cx, cy) {
  for (let i = 0; i < 22; i++) {
    const a = (Math.PI * 2 / 22) * i + Math.random() * 0.3;
    const spd = 3 + Math.random() * 7;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 3,
      g: 0.22, life: 1, dec: 0.018 + Math.random() * 0.015,
      sz: 6 + Math.random() * 14, rot: Math.random() * 6.28,
      rspd: (Math.random() - 0.5) * 0.25,
      kind: ['star','circle','square'][Math.floor(Math.random() * 3)]
    });
  }
  // "OUCH!" popup
  particles.push({
    x: cx, y: cy - 30, vx: 0, vy: -2,
    g: 0, life: 1, dec: 0.018, sz: 0,
    rot: 0, rspd: 0, kind: 'text', txt: 'OUCH!'
  });
}

function spawnJumpDust(cx, cy) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: cx + (Math.random() - 0.5) * 30,
      y: cy, vx: (Math.random() - 0.5) * 3.5, vy: -1 - Math.random() * 2,
      g: 0.12, life: 1, dec: 0.055 + Math.random() * 0.03,
      sz: 3 + Math.random() * 5, rot: 0, rspd: 0, kind: 'circle'
    });
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function onInput() {
  initAudio();
  if (state === 'menu')                           startGame();
  else if (state === 'playing')                   player.jump();
  else if (state === 'dead' && deathTimer > 50)   startGame();
}

// Convert a pointer event to canvas-space coords
function toCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height)
  };
}

// Returns true if theme UI consumed the event
function handleThemePointer(cx, cy) {
  // Theme button toggle
  if (cx >= TB.x && cx <= TB.x + TB.w && cy >= TB.y && cy <= TB.y + TB.h) {
    showThemePicker = !showThemePicker;
    return true;
  }
  // Picker option selection
  if (showThemePicker) {
    const keys = Object.keys(THEMES);
    const pw = 186, ph = 44, gap = 4;
    const px = TB.x + TB.w - pw, py = TB.y + TB.h + 6;
    for (let i = 0; i < keys.length; i++) {
      const oy = py + i * (ph + gap);
      if (cx >= px && cx <= px + pw && cy >= oy && cy <= oy + ph) {
        currentTheme = keys[i]; showThemePicker = false; return true;
      }
    }
    showThemePicker = false; // click outside closes it
    return true;
  }
  return false;
}

document.addEventListener('keydown', e => {
  if (['Space','ArrowUp','KeyW'].includes(e.code)) { e.preventDefault(); onInput(); }
});
canvas.addEventListener('mousedown', e => {
  const { x, y } = toCanvas(e.clientX, e.clientY);
  if (!handleThemePointer(x, y)) onInput();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { x, y } = toCanvas(t.clientX, t.clientY);
  if (!handleThemePointer(x, y)) onInput();
}, { passive: false });

// ─── GAME CONTROL ────────────────────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0; speed = INIT_SPEED; frame = 0; deathTimer = 0;
  obstacles = []; particles = [];
  spawnT = 0; nextSpawn = 85;
  lastMilestone = 0; groundOff = 0; shakeStr = 0;
  player.reset();
  initWorld();
}

function gameOver() {
  state = 'dead';
  player.alive = false;
  if (score > highScore) highScore = score;
  spawnDeathBurst(player.x + player.w / 2, player.y + player.h / 2);
  shakeStr = 18;
  beep('death');
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function resolveCollisions() {
  const hb = player.hb;
  for (const o of obstacles) {
    // Broad phase
    if (hb.x + hb.w <= o.x || hb.x >= o.x + o.w) continue;
    if (hb.y + hb.h <= o.y || hb.y >= o.y + o.h) continue;

    if (o.type === 'spike') {
      // Spikes always kill — triangle precision test
      const px  = hb.x + hb.w / 2;
      const py  = hb.y + hb.h;
      const tipX     = o.x + o.w / 2;
      const halfBase = o.w / 2;
      const frac     = Math.max(0, 1 - Math.abs(px - tipX) / halfBase);
      const spikeTopAtX = o.y + o.h - frac * o.h;
      if (py > spikeTopAtX + 6) return true;
    } else {
      // Block — landing on top is safe; hitting the side kills
      // "From above" = previous visual bottom was at or above the block top
      const prevBottom = player.prevY + player.h;
      if (prevBottom <= o.y + 10 && player.vy >= 0) {
        // Land safely on top of block
        if (player.vy > 4) { player.sx = 1.45; player.sy = 0.55; }
        player.y       = o.y - player.h;
        player.vy      = 0;
        player.jumps   = 0;
        player.onGround = true;
        player.rot     *= 0.6;
        spawnJumpDust(player.x + player.w / 2, player.y + player.h);
      } else {
        return true; // side collision — die
      }
    }
  }
  return false;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update() {
  frame++;

  // Screen shake decay
  shakeStr *= 0.83;
  shakeX = (Math.random() - 0.5) * shakeStr;
  shakeY = (Math.random() - 0.5) * shakeStr;

  // Background always updates
  const bgSpd = state === 'playing' ? speed * 0.15 : 0.3;
  for (const c of clouds) {
    c.x -= c.spd * bgSpd;
    if (c.x < -250) c.x = W + 250;
  }
  const bldSpd = state === 'playing' ? speed * 0.5 : 0.6;
  for (const b of buildings) {
    b.x -= bldSpd;
    if (b.x + b.w < -10) b.x = W + b.w + Math.random() * 60;
  }

  if (state === 'playing') {
    score++;
    speed = Math.min(MAX_SPEED, INIT_SPEED + (score / 700) * 0.45);

    // Score milestones
    const ms = Math.floor(score / 500) * 500;
    if (ms > lastMilestone && ms > 0) { lastMilestone = ms; beep('milestone'); }

    player.update();

    // Obstacle spawn
    spawnT++;
    if (spawnT >= nextSpawn) { spawnObstacle(); spawnT = 0; }

    // Move obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].x + obstacles[i].w < -30) obstacles.splice(i, 1);
    }

    groundOff = (groundOff + speed) % 60;

    if (resolveCollisions()) gameOver();
  }

  if (state === 'dead') deathTimer++;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.g; p.vx *= 0.98;
    p.rot += p.rspd; p.life -= p.dec;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── DRAW HELPERS ────────────────────────────────────────────────────────────
function wobblyText(text, cx, y, size, fill = '#fff', stroke = '#000') {
  ctx.font = `bold ${size}px "Courier New", monospace`;
  ctx.lineWidth = Math.max(2, size / 7);
  ctx.textAlign = 'left';
  const totalW = ctx.measureText(text).width;
  let curX = cx - totalW / 2;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const wobble = Math.sin(frame * 0.065 + i * 0.72) * 4.5;
    const cw = ctx.measureText(ch).width;
    ctx.save();
    ctx.translate(curX, y + wobble);
    ctx.strokeStyle = stroke; ctx.fillStyle = stroke;
    ctx.strokeText(ch, 0, 0);
    ctx.fillStyle = fill;
    ctx.fillText(ch, 0, 0);
    ctx.restore();
    curX += cw;
  }
  ctx.textAlign = 'left';
}

// ─── DRAW BACKGROUND ─────────────────────────────────────────────────────────
function drawBg() {
  const t = T();
  // Sky gradient
  const sk = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sk.addColorStop(0, t.sky[0]); sk.addColorStop(0.55, t.sky[1]); sk.addColorStop(1, t.sky[2]);
  ctx.fillStyle = sk;
  ctx.fillRect(0, 0, W, GROUND_Y + 2);

  // Per-theme background layer
  if      (t.bgType === 'colorCity') drawBgColorCity();
  else if (t.bgType === 'rainbow')   drawBgRainbow();
  else if (t.bgType === 'skylight')  drawBgSkylight();
  else                               drawBgCity();       // original

  for (const c of clouds) drawCloud(c.x, c.y, c.s, t.cloudFill);
}

// ── original: stars + dark silhouette buildings ──
function drawBgCity() {
  const sc = T().starColor;
  for (const s of stars) {
    const a = 0.35 + 0.65 * Math.abs(Math.sin(s.ph + frame * 0.022));
    ctx.fillStyle = sc + a.toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  for (const b of buildings) {
    ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
    for (let wy = b.y+10; wy < b.y+b.h-8; wy += 18)
      for (let wx = b.x+7; wx < b.x+b.w-7; wx += 16) {
        ctx.fillStyle = Math.sin(wx*4.1+wy*2.7) > 0.3 ? '#555' : '#2a2a2a';
        ctx.fillRect(wx, wy, 8, 6);
      }
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x+b.w*0.35, b.y); ctx.lineTo(b.x+b.w*0.35, b.y-14);
    ctx.moveTo(b.x+b.w*0.65, b.y); ctx.lineTo(b.x+b.w*0.65, b.y-9);
    ctx.stroke();
  }
}

// ── full color: daylight sky, sun, bright colored buildings ──
// Muted, slightly desaturated city palette — easier on the eyes
const CITY_COLORS = ['#c0544f','#3b7dbf','#c8b84a','#4e9955','#c07a30','#2899a8','#b84d7a','#6b4fb0'];
function drawBgColorCity() {
  const sc = T().starColor;
  // Sparse stars
  for (const s of stars.slice(0, 15)) {
    const a = 0.1 + 0.15 * Math.abs(Math.sin(s.ph + frame * 0.02));
    ctx.fillStyle = sc + a.toFixed(2) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.7, 0, Math.PI * 2); ctx.fill();
  }
  // Sun (softer glow)
  const sunX = W * 0.78, sunY = 55;
  const sg = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 50);
  sg.addColorStop(0, 'rgba(255,240,160,0.85)'); sg.addColorStop(0.5, 'rgba(255,210,60,0.3)'); sg.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(sunX, sunY, 50, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5d040'; ctx.strokeStyle = '#e8c030'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(sunX, sunY, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // Buildings
  for (const b of buildings) {
    const col = CITY_COLORS[Math.abs(Math.floor(b.x*7.3+b.y*3.1)) % CITY_COLORS.length];
    ctx.fillStyle = col; ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2;
    ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
    // Dark overlay on building face so windows don't bleed into sky
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Subtle, low-contrast windows
    for (let wy = b.y+10; wy < b.y+b.h-8; wy += 18)
      for (let wx = b.x+7; wx < b.x+b.w-7; wx += 16) {
        ctx.fillStyle = Math.sin(wx*4.1+wy*2.7) > 0
          ? 'rgba(255,245,180,0.28)'   // lit window — soft, dim
          : 'rgba(0,0,0,0.35)';        // dark window
        ctx.fillRect(wx, wy, 8, 6);
      }
    // Small flag on roof
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(b.x+b.w*0.4, b.y-10, 2, 10);
    ctx.fillStyle = col; ctx.fillRect(b.x+b.w*0.42, b.y-10, 8, 6);
  }
}

// ── pastel: rainbow arc + sparkle stars + soft buildings ──
const RAINBOW_COLS = [
  'rgba(255,110,110,0.6)','rgba(255,185,80,0.6)','rgba(255,235,80,0.6)',
  'rgba(110,220,110,0.6)','rgba(100,170,255,0.6)','rgba(195,120,255,0.6)'
];
function drawBgRainbow() {
  // Sparkle stars
  for (const s of stars) {
    const a = 0.3 + 0.7 * Math.abs(Math.sin(s.ph + frame * 0.03));
    ctx.fillStyle = `rgba(255,150,200,${a.toFixed(2)})`;
    star5(s.x, s.y, s.r * 0.35, s.r * 1.1); ctx.fill();
  }
  // Rainbow arcs (centre below screen so only top half of arcs visible)
  const rcx = W * 0.5, rcy = GROUND_Y + 90;
  for (let i = 0; i < RAINBOW_COLS.length; i++) {
    const r = 300 + i * 22;
    ctx.strokeStyle = RAINBOW_COLS[i]; ctx.lineWidth = 20;
    ctx.beginPath(); ctx.arc(rcx, rcy, r, Math.PI, 0); ctx.stroke();
  }
  // White rainbow rim outline
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(rcx, rcy, 300, Math.PI, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(rcx, rcy, 300+5*22+20, Math.PI, 0); ctx.stroke();
  // Pastel buildings
  for (const b of buildings) {
    ctx.fillStyle = '#dbbfdf'; ctx.strokeStyle = '#c06898'; ctx.lineWidth = 2;
    ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
    for (let wy = b.y+10; wy < b.y+b.h-8; wy += 18)
      for (let wx = b.x+7; wx < b.x+b.w-7; wx += 16) {
        ctx.fillStyle = Math.sin(wx*4.1+wy*2.7) > 0.2 ? '#ffcdd2' : 'rgba(255,255,255,0.5)';
        ctx.fillRect(wx, wy, 8, 6);
      }
  }
}

// ── purplish: aurora bands + purple stars + crystal buildings ──
const AURORA_COLS = [
  'rgba(0,255,150,','rgba(80,200,255,','rgba(210,80,255,',
  'rgba(0,240,200,','rgba(140,80,255,'
];
function drawBgSkylight() {
  // Stars (purple-tinted)
  for (const s of stars) {
    const a = 0.4 + 0.6 * Math.abs(Math.sin(s.ph + frame * 0.022));
    ctx.fillStyle = `rgba(200,160,255,${a.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  // Aurora wavy bands
  ctx.save(); ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    const baseY = 35 + i * 48;
    const amp   = 14 + i * 7;
    const ph    = frame * 0.013 + i * 0.9;
    ctx.strokeStyle = AURORA_COLS[i] + '0.38)';
    ctx.lineWidth   = 20 + i * 7;
    ctx.beginPath(); ctx.moveTo(0, baseY);
    for (let px2 = 0; px2 <= W; px2 += 6) {
      const py2 = baseY + Math.sin(px2 * 0.011 + ph) * amp
                        + Math.sin(px2 * 0.019 + ph * 1.4) * amp * 0.45;
      ctx.lineTo(px2, py2);
    }
    ctx.stroke();
  }
  ctx.restore();
  // Crystal spire buildings
  for (const b of buildings) {
    ctx.fillStyle = '#1a0045'; ctx.strokeStyle = '#7c4dff'; ctx.lineWidth = 1.5;
    ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
    for (let wy = b.y+10; wy < b.y+b.h-8; wy += 18)
      for (let wx = b.x+7; wx < b.x+b.w-7; wx += 16) {
        ctx.fillStyle = Math.sin(wx*4.1+wy*2.7) > 0.2
          ? 'rgba(120,60,255,0.9)' : 'rgba(0,220,200,0.5)';
        ctx.fillRect(wx, wy, 8, 6);
      }
    // Crystal tip
    ctx.fillStyle = 'rgba(200,160,255,0.6)';
    ctx.beginPath();
    ctx.moveTo(b.x + b.w*0.5, b.y - 16);
    ctx.lineTo(b.x + b.w*0.3, b.y);
    ctx.lineTo(b.x + b.w*0.7, b.y);
    ctx.closePath(); ctx.fill();
  }
}

function drawCloud(x, y, s, fillColor) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  const blobs = [
    { x: 0, y: 0, r: 22 }, { x: 34, y: -13, r: 27 },
    { x: 68, y: 0, r: 22 }, { x: 17, y: 10, r: 18 }, { x: 51, y: 10, r: 18 }
  ];
  ctx.fillStyle = fillColor || '#d8d8d8';
  ctx.beginPath();
  for (const b of blobs) { ctx.moveTo(b.x + b.r, b.y); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); }
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 3 / s;
  ctx.beginPath();
  ctx.arc(0,  0,  22, Math.PI * 0.68, Math.PI * 1.85);
  ctx.arc(34, -13, 27, Math.PI * 0.85, Math.PI * 2.15);
  ctx.arc(68, 0,  22, Math.PI * 1.5,  Math.PI * 0.32);
  ctx.arc(51, 10, 18, 0, Math.PI);
  ctx.arc(17, 10, 18, 0, Math.PI);
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

// ─── DRAW GROUND ─────────────────────────────────────────────────────────────
function drawGround() {
  const g = T().ground;
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gg.addColorStop(0, g.top); gg.addColorStop(0.08, g.mid); gg.addColorStop(1, g.bot);
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Top line
  ctx.fillStyle = g.line;
  ctx.fillRect(0, GROUND_Y - 1, W, 4);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
  ctx.strokeRect(0, GROUND_Y - 1, W, 4);

  // Animated checker tiles
  const tw = 60, th = 32;
  for (let tx = -groundOff; tx < W + tw; tx += tw) {
    const idx = Math.floor((tx + groundOff) / tw);
    ctx.fillStyle = idx % 2 === 0 ? g.tile1 : g.tile2;
    ctx.fillRect(tx, GROUND_Y + 3, tw, th);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
    ctx.strokeRect(tx, GROUND_Y + 3, tw, th);
  }

  // Striped lower section
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = i % 2 === 0 ? g.stripe1 : g.stripe2;
    ctx.fillRect(0, GROUND_Y + 35 + i * 14, W, 14);
  }
}

// ─── DRAW OBSTACLES ──────────────────────────────────────────────────────────
function drawObstacles() {
  for (const o of obstacles) {
    o.type === 'spike' ? drawSpike(o) : drawBlock(o);
  }
}

function drawSpike({ x, y, w, h }) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, GROUND_Y + 6, w * 0.42, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body — red
  const sg = ctx.createLinearGradient(x, y, x, y + h);
  sg.addColorStop(0, '#ff3322'); sg.addColorStop(0.5, '#cc1100'); sg.addColorStop(1, '#7a0000');
  ctx.fillStyle = sg;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(x, y + h); ctx.lineTo(x + w / 2, y); ctx.lineTo(x + w, y + h);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Red glow at base
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h, w * 0.55, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Highlight
  ctx.strokeStyle = 'rgba(255,180,180,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + w * 0.28, y + h * 0.75); ctx.lineTo(x + w / 2, y + 5);
  ctx.stroke();

  // Angry cartoon face on spike
  const fy = y + h * 0.58, fx = x + w / 2;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(fx - 6, fy, 4.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(fx + 6, fy, 4.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(fx - 5, fy + 1, 2.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(fx + 7, fy + 1, 2.8, 0, Math.PI * 2); ctx.fill();
  // Angry brows
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(fx - 10, fy - 5.5); ctx.lineTo(fx - 2, fy - 3.5); ctx.stroke();
  ctx.moveTo(fx + 10, fy - 5.5); ctx.lineTo(fx + 2, fy - 3.5); ctx.stroke();
}

function drawBlock({ x, y, w, h }) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, GROUND_Y + 6, w * 0.42, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body with clip for cross-hatch
  ctx.save();
  roundRect(x, y, w, h, 6);
  ctx.clip();
  const bc = T().block;
  const bg = ctx.createLinearGradient(x, y, x, y + h);
  bg.addColorStop(0, bc.g1); bg.addColorStop(0.5, bc.g2); bg.addColorStop(1, bc.g3);
  ctx.fillStyle = bg;
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  // Diagonal cross-hatch
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1;
  for (let i = -h; i < w + h; i += 11) {
    ctx.beginPath();
    ctx.moveTo(x + i, y); ctx.lineTo(x + i - h, y + h);
    ctx.stroke();
  }
  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 3, y + 3, w - 6, 9);
  ctx.restore();

  // Outline
  roundRect(x, y, w, h, 6);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 3.5;
  ctx.stroke();

  // Grumpy face on block
  const mx = x + w / 2, my = y + h / 2;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(mx - 9, my - 5, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(mx + 9, my - 5, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(mx - 8, my - 4, 3.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + 10, my - 4, 3.2, 0, Math.PI * 2); ctx.fill();
  // Grumpy brows
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.moveTo(mx - 14, my - 12); ctx.lineTo(mx - 4, my - 9); ctx.stroke();
  ctx.moveTo(mx + 14, my - 12); ctx.lineTo(mx + 4, my - 9); ctx.stroke();
  // Grumpy frown
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mx, my + 8, 6, Math.PI + 0.4, -0.4); ctx.stroke();
}

// ─── DRAW PARTICLES ──────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.kind === 'star') {
      star5(0, 0, p.sz * 0.38, p.sz);
      ctx.fillStyle = '#e0e0e0'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.fill(); ctx.stroke();
    } else if (p.kind === 'circle') {
      ctx.fillStyle = '#aaa'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, p.sz, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (p.kind === 'square') {
      ctx.fillStyle = '#888'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.fillRect(-p.sz, -p.sz, p.sz * 2, p.sz * 2);
      ctx.strokeRect(-p.sz, -p.sz, p.sz * 2, p.sz * 2);
    } else if (p.kind === 'text') {
      ctx.font = 'bold 30px "Courier New", monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#000'; ctx.fillStyle = '#fff'; ctx.lineWidth = 5;
      ctx.strokeText(p.txt, 0, 0); ctx.fillText(p.txt, 0, 0);
    }
    ctx.restore();
  }
}

// ─── DRAW HUD ─────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.textBaseline = 'alphabetic';
  // Score
  ctx.font = 'bold 27px "Courier New", monospace';
  ctx.lineWidth = 4.5; ctx.strokeStyle = '#000'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.strokeText('SCORE: ' + score, 18, 40); ctx.fillText('SCORE: ' + score, 18, 40);
  ctx.font = 'bold 16px "Courier New", monospace'; ctx.lineWidth = 3;
  ctx.strokeText('BEST: ' + highScore, 18, 62); ctx.fillText('BEST: ' + highScore, 18, 62);

  // Jump dots
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px "Courier New", monospace'; ctx.lineWidth = 2.5;
  ctx.strokeText('JUMPS', W - 16, 38); ctx.fillText('JUMPS', W - 16, 38);
  for (let i = 0; i < player.maxJumps; i++) {
    const jx = W - 16 - (player.maxJumps - 1 - i) * 24;
    const used = i < player.maxJumps - player.jumps;
    ctx.beginPath(); ctx.arc(jx, 55, 9, 0, Math.PI * 2);
    ctx.fillStyle = used ? '#fff' : '#2a2a2a'; ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.2; ctx.stroke();
    if (used) {
      star5(jx, 55, 3.5, 7);
      ctx.fillStyle = '#888'; ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  }

  // Touch hint (fades after first 200 frames)
  if (navigator.maxTouchPoints > 0 && score < 200) {
    const alpha = Math.max(0, 1 - score / 180) * (0.5 + 0.5 * Math.sin(frame * 0.08));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'right'; ctx.font = 'bold 18px "Courier New", monospace';
    ctx.strokeStyle = '#000'; ctx.fillStyle = '#fff'; ctx.lineWidth = 3;
    ctx.strokeText('TAP TO JUMP', W - 18, H - 125);
    ctx.fillText('TAP TO JUMP', W - 18, H - 125);
    ctx.restore();
  }

  // Speed meter
  const lvl = Math.floor((speed - INIT_SPEED) * 2.5);
  if (lvl > 0) {
    const bars = Math.min(lvl, 10);
    ctx.textAlign = 'center';
    ctx.font = `bold 13px "Courier New", monospace`;
    ctx.strokeStyle = '#000'; ctx.fillStyle = `rgba(255,255,255,${0.45 + bars * 0.05})`;
    const bar = '█'.repeat(bars) + '░'.repeat(10 - bars);
    ctx.strokeText('SPD ' + bar, W / 2, 28); ctx.fillText('SPD ' + bar, W / 2, 28);
  }
}

// ─── SPEED LINES ─────────────────────────────────────────────────────────────
function drawSpeedLines() {
  const t = (speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED);
  if (t < 0.12) return;
  ctx.save();
  ctx.globalAlpha = t * 0.28;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  for (let i = 0; i < 14; i++) {
    const ly = 70 + i * ((GROUND_Y - 70) / 14);
    const len = 25 + Math.random() * 110;
    ctx.beginPath();
    ctx.moveTo(player.x - len - 15, ly + (Math.random() - 0.5) * 9);
    ctx.lineTo(player.x - 18, ly);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── POST-PROCESSING ─────────────────────────────────────────────────────────
function drawVignette() {
  const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.28, W / 2, H / 2, H * 0.85);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.52)');
  ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
}

function drawScanlines() {
  ctx.save(); ctx.globalAlpha = 0.045; ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);
  ctx.restore();
}

function drawGrain() {
  ctx.save(); ctx.globalAlpha = 0.022;
  for (let i = 0; i < 350; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
    ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }
  ctx.restore();
}

// ─── MENU SCREEN ─────────────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, W, H);

  // Orbiting stars
  for (let i = 0; i < 9; i++) {
    const a = frame * 0.017 + i * (Math.PI * 2 / 9);
    const sx = W / 2 + Math.cos(a) * 210;
    const sy = 200 + Math.sin(a) * 52;
    star5(sx, sy, 4, 10);
    ctx.fillStyle = '#ddd'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();
  }

  // Title
  wobblyText('RETRO', W / 2, 148, 92, '#fff', '#000');
  wobblyText('DASH',  W / 2, 228, 92, '#fff', '#000');

  // Decorative rule
  ctx.textAlign = 'center'; ctx.fillStyle = '#666';
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.fillText('✦ ─────────────────────── ✦', W / 2, 268);

  // Bouncing player preview
  const bounce = Math.abs(Math.sin(frame * 0.075)) * 22;
  ctx.save(); ctx.translate(0, -bounce);
  player.draw();
  ctx.restore();

  // Blink prompt — adapts to touch vs keyboard
  const isTouchDev = navigator.maxTouchPoints > 0;
  if (Math.floor(frame / 28) % 2 === 0) {
    wobblyText(isTouchDev ? 'TAP ANYWHERE TO START' : 'CLICK OR PRESS SPACE TO START', W / 2, 328, 22);
  }
  wobblyText('✦ DOUBLE JUMP ALLOWED! ✦', W / 2, 374, 18, '#aaa', '#000');
}

// ─── GAME OVER SCREEN ────────────────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  // Shaky title on impact
  const shk = deathTimer < 22 ? (Math.random() - 0.5) * 14 : 0;
  ctx.save(); ctx.translate(shk, shk * 0.4);
  wobblyText('GAME OVER!', W / 2, 188, 76);
  ctx.restore();

  wobblyText(`SCORE: ${score}`, W / 2, 268, 40);
  if (score > 0 && score >= highScore) {
    wobblyText('✦ NEW HIGH SCORE! ✦', W / 2, 315, 30, '#e0e0e0');
  } else {
    wobblyText(`BEST: ${highScore}`, W / 2, 315, 28, '#aaa');
  }

  // Orbiting decoration
  for (let i = 0; i < 6; i++) {
    const a = frame * 0.022 + i * (Math.PI * 2 / 6);
    star5(W / 2 + Math.cos(a) * 165, 260 + Math.sin(a) * 38, 5, 11);
    ctx.fillStyle = '#ccc'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();
  }

  if (deathTimer > 50 && Math.floor(deathTimer / 28) % 2 === 0) {
    const isTouchDev = navigator.maxTouchPoints > 0;
    wobblyText(isTouchDev ? 'TAP TO RETRY' : 'CLICK OR PRESS SPACE TO RETRY', W / 2, 382, 22);
  }
}

// ─── THEME BUTTON & PICKER ───────────────────────────────────────────────────
function drawThemeButton() {
  const { x, y, w, h } = TB;
  // Pill background
  roundRect(x, y, w, h, 9);
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 2; ctx.stroke();

  // 2×2 swatch grid inside button
  const keys = Object.keys(THEMES);
  const positions = [{dx:10,dy:8},{dx:26,dy:8},{dx:10,dy:22},{dx:26,dy:22}];
  keys.forEach((k, i) => {
    if (i >= 4) return;
    const { dx, dy } = positions[i];
    const isActive = currentTheme === k;
    ctx.beginPath(); ctx.arc(x + dx, y + dy, 7, 0, Math.PI*2);
    ctx.fillStyle = THEMES[k].swatches[0]; ctx.fill();
    ctx.strokeStyle = isActive ? '#fff' : 'rgba(0,0,0,0.5)';
    ctx.lineWidth = isActive ? 2.5 : 1.2; ctx.stroke();
  });

  // Small arrow indicator
  ctx.fillStyle = showThemePicker ? '#fff' : 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(showThemePicker ? '▲' : '▼', x + w - 7, y + h/2 + 3);
}

function drawThemePicker() {
  const keys = Object.keys(THEMES);
  const pw = 192, ph = 46, gap = 5;
  const px = TB.x + TB.w - pw;
  const py = TB.y + TB.h + 7;
  const panH = keys.length * (ph + gap) - gap + 16;

  // Panel backdrop
  roundRect(px - 6, py - 8, pw + 12, panH, 12);
  ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.5; ctx.stroke();

  for (let i = 0; i < keys.length; i++) {
    const k   = keys[i];
    const th  = THEMES[k];
    const oy  = py + i * (ph + gap);
    const sel = currentTheme === k;

    // Row background
    roundRect(px, oy, pw, ph, 7);
    ctx.fillStyle = sel ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.05)';
    ctx.fill();
    if (sel) { ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke(); }

    // 3 swatches
    th.swatches.forEach((col, j) => {
      ctx.beginPath(); ctx.arc(px + 18 + j * 24, oy + ph/2, 10, 0, Math.PI*2);
      ctx.fillStyle = col; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
    });

    // Label
    ctx.textAlign = 'left'; ctx.font = `bold ${sel ? 15 : 14}px "Courier New", monospace`;
    ctx.fillStyle = sel ? '#ffffff' : '#bbbbbb';
    ctx.fillText(th.name, px + 92, oy + ph/2 + 5);

    // Checkmark
    if (sel) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'right'; ctx.fillText('✓', px + pw - 6, oy + ph/2 + 5);
    }
  }
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBg();
  drawGround();

  if (state !== 'menu') drawObstacles();

  drawSpeedLines();
  player.draw();
  drawParticles();

  if (state === 'playing') drawHUD();

  ctx.restore();

  drawVignette();
  drawScanlines();
  drawGrain();

  if (state === 'menu')      drawMenu();
  else if (state === 'dead') drawGameOver();

  // Theme button always on top (outside shake transform, after overlays)
  drawThemeButton();
  if (showThemePicker) drawThemePicker();
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
initWorld();
player.reset();
loop();
</script>
